<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WorldPulse — 世界情勢ライブマップ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- MAP -->
<div id="map-wrap"><svg id="world-svg"></svg></div>

<!-- HEADER -->
<header id="header">
  <div class="logo">WORLD<em>PULSE</em></div>
  <div class="header-sub">世界情勢 リアルタイム</div>
  <div id="live-badge"><div class="live-dot"></div>LIVE</div>
</header>

<!-- FILTERS -->
<div id="filters">
  <button class="flt active-all" data-f="all">すべて</button>
  <button class="flt" data-f="conflict">⚔ 紛争</button>
  <button class="flt" data-f="tension">⚡ 緊張</button>
  <button class="flt" data-f="political">🏛 政治</button>
  <button class="flt" data-f="economic">📊 経済</button>
</div>

<!-- HOT STORIES -->
<div id="hot-stories"></div>

<!-- LEGEND -->
<div id="legend">
  <div id="legend-title">凡例 / LEGEND</div>
  <div class="leg-row"><div class="leg-dot" style="background:var(--conflict)"></div>紛争・戦争</div>
  <div class="leg-row"><div class="leg-dot" style="background:var(--tension)"></div>緊張・不安定</div>
  <div class="leg-row"><div class="leg-dot" style="background:var(--political)"></div>政治ニュース</div>
  <div class="leg-row"><div class="leg-dot" style="background:var(--economic)"></div>経済ニュース</div>
  <div class="leg-row"><div class="leg-dot" style="background:var(--country); border:1px solid #1a3448"></div>情報なし</div>
</div>

<!-- STAT BAR -->
<div id="statbar">
  <div class="stat"><span class="stat-lbl">紛争地域</span><span class="stat-val" style="color:var(--conflict)">8</span></div>
  <div class="stat"><span class="stat-lbl">緊張地域</span><span class="stat-val" style="color:var(--tension)">12</span></div>
  <div class="stat"><span class="stat-lbl">追跡国数</span><span class="stat-val" style="color:var(--accent)">26</span></div>
</div>

<!-- ZOOM HINT -->
<div id="zoom-hint">SCROLL: ズーム　DRAG: 移動</div>

<!-- NEWS PANEL -->
<div id="news-panel">
  <div id="panel-top">
    <button id="panel-close">✕</button>
    <div id="panel-country"></div>
    <div id="panel-summary"></div>
    <div id="panel-tags"></div>
  </div>
  <div id="panel-articles"></div>
</div>

<!-- TOOLTIP -->
<div id="tooltip">
  <div class="tt-name" id="tt-name"></div>
  <span class="tt-tag" id="tt-tag"></span>
  <div class="tt-txt" id="tt-txt"></div>
</div>

<!-- TICKER -->
<div id="ticker">
  <div class="tick-label">速報</div>
  <div class="tick-track-wrap"><div class="tick-track" id="tick-track"></div></div>
</div>

<script src="js/app.js"></script>
</body>
</html>
