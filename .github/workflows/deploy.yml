name: Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Update News Data"]
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Deploy to Netlify
        run: |
          curl -s -X POST \
            "https://api.netlify.com/api/v1/sites/${{ secrets.NETLIFY_SITE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.NETLIFY_AUTH_TOKEN }}" \
            -H "Content-Type: application/zip" \
            --data-binary @<(cd $GITHUB_WORKSPACE && zip -r - . -x ".git/*" ".github/*" "*.DS_Store") \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print('state:', d.get('state')); print('url:', d.get('url'))"
